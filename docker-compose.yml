version: '3.8'

x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://invoice_user:invoice_pass_2024@postgres:5432/invoice_manager
  DATABASE_URL_SYNC: postgresql://invoice_user:invoice_pass_2024@postgres:5432/invoice_manager
  REDIS_URL: redis://redis:6379/0
  OLLAMA_URL: http://192.168.0.120:11434
  LLM_MODEL: qwen3:14b
  VLM_MODEL: qwen2.5vl:7b
  LLM_TEMPERATURE: "0.0"

services:
  postgres:
    image: postgres:16-alpine
    container_name: invoice-postgres
    environment:
      POSTGRES_DB: invoice_manager
      POSTGRES_USER: invoice_user
      POSTGRES_PASSWORD: invoice_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice_user -d invoice_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: invoice-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: invoice-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  invoice-celery:
    build:
      context: ./backend
      dockerfile: services/invoice-pipeline/Dockerfile
    container_name: invoice-celery
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=info --concurrency=2 -Q invoices
    environment:
      <<: *common-env
      UPLOAD_DIR: /app/data/pdfs
    volumes:
      - ./backend/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-celery:
    build:
      context: ./backend
      dockerfile: services/ai-service/Dockerfile
    container_name: invoice-ai-celery
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=info --concurrency=2 -Q metrics
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
